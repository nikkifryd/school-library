<!DOCTYPE html>

<html>
    <head>
        <meta charset="UTF-8">
        <meta name="description" content="Bücherei der GS Dingelsdorf">
        <meta name="author" content="Nika Frey">
        <meta http-equiv="refresh" content="180">
        <meta name="viewport" content="width=device-width">

        <title>Schülerbücherei</title>
        <style>
            ::-webkit-scrollbar {
                background: transparent;
            }
            body { 
                font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
                background-color: #fffef7;
            }
            body h2 {
                margin-bottom: 10px;
                cursor: default;
            }
            body hr {
                background-color: black;
                height: 1.5px;
            }
            #searchBar {
                font:'Trebuchet MS';
                position: sticky;
                width: 100%;
                height: 40px;
                border-width: 1.5px;
                border-radius: 3px;
                background-color: #d4def3;
            }
        </style>
        
        <link rel="stylesheet" type="text/css" href="./styles/tables.css">
        <link rel="stylesheet" type="text/css" href="./styles/windows.css">
        <link rel="stylesheet" type="text/css" href="./styles/buttons.css">
    </head>

    <body>
        <h2>Schülerbücherei</h2>
        <hr>
        <div class="searchbar">
            <input type="text" id="searchBar" name="searchBar" placeholder="Suche">
        </div>
        <table name="books" id="booksTable" class="booksTable">
            <colgroup>
                <col span="1" id="book-id">
            </colgroup>
            <tr>
                <th>ID</th>
                <th>Buch</th>
                <th>Autor*in</th>
            </tr>
        </table>
    
        <div id="overlay"></div>
        <div class="lending" id="lending">
            <div class="window-header" id="window-header">
                <h3 id="lending-book-id"></h3>
                <h3 id="lending-book-title"></h3>
                <button type="button" class="borrow-button">
                    Leihen
                </button>
            </div>

            <table name="lending" id="lendingTable" class="lendingTable">
                <tr>
                    <th><span>  Schüler*in </span></th>
                    <th><span> ausgeliehen  </span></th>
                    <th><span>  zurückgegeben</span></th>
                </tr>
            </table>
        </div>

    
    <script type="module" src="./src/web.js" ></script>
    </body>
</html>
