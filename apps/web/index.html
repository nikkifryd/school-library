<!DOCTYPE html>

<html>
    <head>
        <meta charset="UTF-8">
        <meta name="description" content="Bücherei der GS Dingelsdorf">
        <meta name="author" content="Nika Frey">
        <meta http-equiv="refresh" content="60">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Schülerbücherei</title>
        <style>
            .hoverZoom:hover{
                transition: .08s;
                transform: scale(1.05);
            }
            body { 
                font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
                background-color: #f9f6e9;
            }
            hr {
                background-color: black;
                height: 1.5px;
            }
            #searchBook {
                font:'Trebuchet MS';
                width: 100%;
                border-width: 1.5px;
                border-radius: 3px;
                background-color: #d4def3;
            }
            .booksTable {
                width: 90%;
                min-width: 40px;
                alignment-baseline: center;
                background-color: #7188BA;
                border-radius: 5px;
                border-spacing: 7px;
                padding-top: 3px;
                margin-top: 13px;
                margin-left: auto;
                margin-right: auto;
            }
            .booksTable, .bookdata {
                border: 1.8px solid rgb(52, 38, 37);
            }
            th {
                margin-bottom: 10px;
                font-size: 21px;
            }
            .bookdata {
                text-align: left;
                height: 42.5px;
                min-width: 20px;
                border-radius: 5px;
                background-color: 	#9eb3e1;
                padding-left: 13px;
                padding-top: 5px;
                padding-bottom: 5px;
            }
            .bookID {
                width: 42.5px;
            }

            #popup-window {
                display: none;
                position: absolute;
                top: 90px;
                left: 10%;
                height: 250px;
                width: 80%;
                border: 3px solid #71665dd8;
                border-radius: 5px;
                background-color: #ffe79a;
            }
            #window-header {
                display: flex;
                width: 100%;
                height: 50px;
                border-bottom: 2px solid black;
                background-color: #caac94a7;
            }
            #window-title {
                display: none;
                margin-top: 10px;
                margin-left: 10px;
            }
            #lendingTable {
                border: 1px solid black;
            }
            .lendingdata {
                border: 1px solid black;
            }
            #overlay {
                display: none;
                position: fixed;
                top:0;
                left: 0;
                height: 100%;
                width: 100%;
                background-color: #8fa4cf58;
            }
        </style>
    </head>
    <body>
        <h2 style="margin-bottom: 10px;">Schülerbücherei</h2>
        <hr>
        <div class="searchbar">
            <input type="text" id="searchBook" name="searchBook" placeholder="Suche">
        </div>
        <table name="books" id="booksTable" class="booksTable">
            <colgroup>
                <col span="1" class="bookID">
            </colgroup>
            <tr>
                <th>ID</th>
                <th>Buch</th>
                <th>Autor*in</th>
            </tr>
        </table>
    
        <div id="overlay"></div>
        <div class="popup-window" id="popup-window">
            <table name="lending" id="lendingTable" class="lendingTable">
                
            </table>
        </div>
    <script src="show/show.js" type="text/javascript"></script>
    <script src="main.js" type="text/javascript"></script>
    </body>
</html>
