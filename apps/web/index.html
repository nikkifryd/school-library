<!DOCTYPE html>

<html>
    <head>
        <meta charset="UTF-8">
        <meta name="description" content="Bücherei der GS Dingelsdorf">
        <meta name="author" content="Nika Frey">
        <meta http-equiv="refresh" content="60">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Schülerbücherei</title>
        <style>
            .hoverZoom:hover{
                transition: .2s;
                transform: scale(1.05);
            }
            body { 
                font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
                background-color: #f9f6e9;
            }
            hr {
                background-color: black;
                height: 1.5px;
            }
            #searchBook {
                display: flex;
                align-items: left;
                font:'Trebuchet MS';
                width: 50%;
                border-width: 1.5px;
                border-radius: 3px;
                background-color: #d4def3;
            }
            .table {
                width: 90%;
                alignment-baseline: center;
                background-color: #7188BA;
                border-radius: 5px;
                border-spacing: 7px;
                padding-top: 3px;
                margin-top: 13px;
                margin-left: auto;
                margin-right: auto;
            }
            table, td {
                border: 1.8px solid rgb(52, 38, 37);
            }
            th {
                margin-bottom: 10px;
                font-size: 21px;
            }
            td {
                text-align: left;
                height: 42.5px;
                min-width: 20px;
                border-radius: 5px;
                background-color: 	#9eb3e1;
                padding-left: 13px;
                padding-top: 5px;
                padding-bottom: 5px;
            }
            .bookID {
                width: 42.5px;
            }
        </style>
    </head>
    <body>
        <h2 style="margin-bottom: 10px;">Schülerbücherei</h2>
        <hr>
        <table name="books" id="bookTable" class="table">
            <colgroup>
                <col span="1" class="bookID">
            </colgroup>
            <tr>
                <th>
                    ID<div class="searchbar">
                        <input type="text" id="searchBook" name="searchBook" placeholder="ID...">
                    </div>
                </th>
                <th>Buch</th>
                <th>Autor*in</th>
            </tr>
        </table>
    <script src="show/show.js" type="text/javascript"></script>
    <script src="main.js" type="text/javascript"></script>
    </body>
</html>
