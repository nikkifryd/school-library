<!DOCTYPE html>

<html>
    <head>
        <meta charset="UTF-8">
        <meta name="description" content="Bücherei der GS Dingelsdorf">
        <meta name="author" content="Nika Frey">
        <meta http-equiv="refresh" content="180">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Schülerbücherei</title>
        <style>
            ::-webkit-scrollbar {
                background: transparent;
            }
                
            .hoverZoom:hover{
                transition: .08s;
                transform: scale(1.03);
                cursor: pointer;
                & > td {
                    background-color: #739fc4;
                    color:#f9f6e9
                }
            }
            body { 
                font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
                background-color: #f9f6e9;
            }
            body hr {
                background-color: black;
                height: 1.5px;
            }
            #searchBook {
                font:'Trebuchet MS';
                width: 100%;
                height: 40px;
                border-width: 1.5px;
                border-radius: 3px;
                background-color: #d4def3;
            }
            .booksTable {
                width: 90%;
                min-width: 40px;
                alignment-baseline: center;
                background-color: #7188BA;
                border: 1.8px solid rgb(52, 38, 37);
                border-radius: 5px;
                border-spacing: 7px;
                padding-top: 3px;
                margin-top: 13px;
                margin-left: auto;
                margin-right: auto;
            }
            .booksTable th {
                margin-bottom: 10px;
                font-size: 21px;
            }
            .booksTable td {
                text-align: left;
                height: 42.5px;
                min-width: 20px;
                background-color: 	#9eb3e1;
                border: 1.8px solid rgb(52, 38, 37);
                border-radius: 5px;
                padding-left: 13px;
                padding-top: 5px;
                padding-bottom: 5px;
            }
            .booksTable #book-id {
                width: 42.5px;
            }

            #lending {
                display: none;
                flex-direction: column;
                justify-items: space-evenly;
                position: fixed;
                top: 90px;
                left: 10%;
                height: 60%;
                width: 80%;
                border: 1px solid #3b3b24;
                border-radius: 1px;
                background-color: #fcfac0;
                box-shadow: 15px 15px 7px #3b3b2494;
                overflow-y: auto;
            }
            .window-header {
                display: flex;
                justify-items: stretch;
                gap: 10px;
                width: 100%;
                min-height: 45px;
                border-bottom: 5px solid #78a8c4;
            }
            .window-header #lending-book-title {
                justify-self: center;
                margin-inline: 20px;
            }
            .window-header #lending-book-id {
                justify-self: flex-start;
                margin-inline: 20px;
            }
            .lendingTable {
                border-collapse: collapse;
            }
            .lendingTable table{
                width: 100%;
                padding: 5px;
                align-items: space-evenly;
            }
            .lendingTable tr {
                height: 10px;
                margin-bottom: 10px;
                border-bottom: 2px solid #aebdc4;
            }
            .lendingTable th {
                text-align: center;
                padding-top: 10px;
                padding-bottom: 10px;
            }
            .lendingTable th span {
                background-color: #f6a5eb8f;
            }
            .lendingTable td {
                text-align: center;
                padding: 5px;
            }

            #overlay {
                display: none;
                position: fixed;
                top:0;
                left: 0;
                height: 100%;
                width: 100%;
                background-color: #42475094;
            }
        </style>
    </head>

    <body>
        <h2 style="margin-bottom: 10px;">Schülerbücherei</h2>
        <hr>
        <div class="searchbar">
            <input type="text" id="searchBook" name="searchBook" placeholder="Suche">
        </div>
        <table name="books" id="booksTable" class="booksTable">
            <colgroup>
                <col span="1" id="book-id">
            </colgroup>
            <tr>
                <th>ID</th>
                <th>Buch</th>
                <th>Autor*in</th>
            </tr>
        </table>
    
        <div id="overlay"></div>
        <div class="lending" id="lending">
            <div class="window-header" id="window-header">
                <h3 id="lending-book-id"></h3>
                <h3 id="lending-book-title"></h3>
            </div>

            <table name="lending" id="lendingTable" class="lendingTable">
                <tr>
                    <th><span>  Schüler*in </span></th>
                    <th><span> ausgeliehen  </span></th>
                    <th><span>  zurückgegeben</span></th>
                </tr>
            </table>
        </div>


    <script src="show/show.js" type="text/javascript"></script>
    <script src="main.js" type="text/javascript"></script>
    </body>
</html>
